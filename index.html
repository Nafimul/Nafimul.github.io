<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafimul Islam - Computer Science Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header Section */
        header {
            text-align: center;
            padding: 3rem 0;
            border-bottom: 2px solid #2a2a3e;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        /* Projects Section */
        .projects-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .projects-header h2 {
            font-size: 2rem;
            color: #e0e0e0;
            margin-bottom: 0.5rem;
        }

        .projects-count {
            color: #a0a0a0;
            font-size: 1rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #667eea;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .project-card {
            background: rgba(42, 42, 62, 0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a3e;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .project-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.2);
        }

        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .project-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .project-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
            font-weight: 600;
        }

        .project-description {
            color: #b0b0b0;
            margin-bottom: 1rem;
            flex-grow: 1;
            line-height: 1.6;
        }

        .project-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .project-language,
        .project-stars {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.9rem;
            color: #a0a0a0;
        }

        .language-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .project-links {
            display: flex;
            gap: 1rem;
        }

        .project-links a {
            flex: 1;
            text-align: center;
            padding: 0.6rem 1rem;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid #667eea;
            color: #667eea;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .project-links a:hover {
            background: #667eea;
            color: white;
        }

        .error-message {
            text-align: center;
            padding: 2rem;
            background: rgba(220, 38, 38, 0.1);
            border: 2px solid rgba(220, 38, 38, 0.3);
            border-radius: 8px;
            color: #fca5a5;
        }

        footer {
            text-align: center;
            padding: 3rem 0 2rem;
            color: #a0a0a0;
            border-top: 2px solid #2a2a3e;
            margin-top: 4rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .social-links {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Nafimul</h1>
            <p class="tagline">Computer Science Student & Developer</p>
            <div class="social-links">
                <a href="https://github.com/Nafimul" target="_blank" rel="noopener">

                    </svg>
                    GitHub

                <a href="https://www.linkedin.com/in/nafimul-islam" target="_blank" rel="noopener">

                        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                    </svg>
                    LinkedIn
                </a>
                <a href="https://devpost.com/islamnafimul" target="_blank" rel="noopener">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6.002 1.61L0 12.004 6.002 22.39h11.996L24 12.004 17.998 1.61H6.002zm1.593 4.084h3.947c3.605 0 6.276 1.695 6.276 6.31 0 4.436-3.21 6.302-6.456 6.302H7.595V5.694zm2.517 2.449v7.714h1.241c2.646 0 3.862-1.55 3.862-3.861.009-2.569-1.096-3.853-3.767-3.853H10.112z"/>
                    </svg>
                    Devpost
                </a>
            </div>
        </header>

        <main>
            <div class="projects-header">
                <h2>My Projects</h2>
                <p class="projects-count" id="projectsCount">Loading projects from GitHub...</p>
            </div>

            <div id="projectsContainer">
                <div class="loading">
                    <svg width="50" height="50" viewBox="0 0 50 50" style="animation: spin 1s linear infinite;">
                        <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="80" stroke-linecap="round"/>
                    </svg>
                    <p style="margin-top: 1rem;">Fetching projects...</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Nafimul. Dynamically updated from GitHub.</p>
        </footer>
    </div>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        const GITHUB_USERNAME = 'Nafimul'; // Change this to your GitHub username
        const GITHUB_API = `https://api.github.com/users/${GITHUB_USERNAME}/repos`;

        // Language colors (GitHub's color scheme)
        const languageColors = {
            'JavaScript': '#f1e05a',
            'Python': '#3572A5',
            'Java': '#b07219',
            'C++': '#f34b7d',
            'C': '#555555',
            'HTML': '#e34c26',
            'CSS': '#563d7c',
            'TypeScript': '#2b7489',
            'Go': '#00ADD8',
            'Ruby': '#701516',
            'PHP': '#4F5D95',
            'Swift': '#ffac45',
            'Kotlin': '#A97BFF',
            'Rust': '#dea584',
            'Dart': '#00B4AB',
            'Shell': '#89e051',
            'Vue': '#41b883',
            'React': '#61dafb',
        };

        async function fetchGitHubProjects() {
            try {
                const response = await fetch(GITHUB_API + '?sort=updated&per_page=100');
                
                if (!response.ok) {
                    throw new Error(`GitHub API returned ${response.status}`);
                }

                let repos = await response.json();
                
                // Filter out forks and the portfolio repo itself, then sort by most recently updated (newest to oldest)
                repos = repos.filter(repo => !repo.fork && repo.name.toLowerCase() !== 'nafimul.github.io');
                repos.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                
                // Fetch README images for each repo
                const detailedRepos = await Promise.all(
                    repos.map(async (repo) => {
                        const imageUrl = await getReadmeImage(repo.owner.login, repo.name);
                        return { ...repo, readmeImage: imageUrl };
                    })
                );
                
                // Special handling: Make sure Chess is always last
                const chessIndex = detailedRepos.findIndex(repo => repo.name === 'Chess');
                if (chessIndex !== -1) {
                    const chess = detailedRepos.splice(chessIndex, 1)[0];
                    detailedRepos.push(chess); // Add to end
                }
                
                // Special handling: Make sure LunarHook is second from the end
                const lunarHookIndex = detailedRepos.findIndex(repo => repo.name === 'LunarHook');
                if (lunarHookIndex !== -1) {
                    const lunarHook = detailedRepos.splice(lunarHookIndex, 1)[0];
                    detailedRepos.splice(detailedRepos.length - 1, 0, lunarHook); // Insert before last item
                }

                displayProjects(detailedRepos);
            } catch (error) {
                console.error('Error fetching projects:', error);
                document.getElementById('projectsContainer').innerHTML = `
                    <div class="error-message">
                        <h3>Unable to load projects</h3>
                        <p>There was an issue connecting to GitHub. Please try again later.</p>
                        <p style="font-size: 0.9rem; margin-top: 1rem;">Error: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function getReadmeImage(owner, repoName) {
            try {
                // Fetch the README file
                const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}/readme`);
                if (!response.ok) return null;
                
                const data = await response.json();
                // Decode the base64 content
                const content = atob(data.content);
                
                // Extract first image from markdown
                // Matches ![alt](url) or ![alt](url "title")
                const imageRegex = /!\[([^\]]*)\]\(([^\s)]+)(?:\s+"[^"]*")?\)/;
                const match = content.match(imageRegex);
                
                if (match && match[2]) {
                    let imageUrl = match[2];
                    
                    // Handle relative URLs - convert to absolute GitHub URLs
                    if (!imageUrl.startsWith('http')) {
                        // Remove leading ./ if present
                        imageUrl = imageUrl.replace(/^\.?\//, '');
                        // Construct raw GitHub URL
                        imageUrl = `https://raw.githubusercontent.com/${owner}/${repoName}/main/${imageUrl}`;
                    }
                    
                    return imageUrl;
                }
            } catch (e) {
                console.log('Could not fetch README image for', repoName, e);
            }
            return null;
        }

        function getRepoImage(repo) {
            // Use the README image if available
            if (repo.readmeImage) {
                return repo.readmeImage;
            }
            // No image available - will use gradient fallback
            return null;
        }

        function displayProjects(repos) {
            const container = document.getElementById('projectsContainer');
            const countElement = document.getElementById('projectsCount');

            if (repos.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #a0a0a0;">No projects found.</p>';
                countElement.textContent = 'No projects found';
                return;
            }

            countElement.textContent = `${repos.length} project${repos.length !== 1 ? 's' : ''}`;

            const projectsGrid = document.createElement('div');
            projectsGrid.className = 'projects-grid';

            repos.forEach(repo => {
                const card = createProjectCard(repo);
                projectsGrid.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(projectsGrid);
        }

        function createProjectCard(repo) {
            const card = document.createElement('div');
            card.className = 'project-card';

            const languageColor = languageColors[repo.language] || '#8b8b8b';
            const description = repo.description || 'No description available';
            
            // Use repository topics/languages to generate a unique gradient
            const gradients = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
                'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
                'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
                'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
            ];
            
            const gradientIndex = repo.name.length % gradients.length;
            const gradient = gradients[gradientIndex];
            
            // Get the README image if available
            const readmeImageUrl = getRepoImage(repo);

            card.innerHTML = `
                <div class="project-image" style="background: ${gradient}">
                    ${readmeImageUrl ? `
                        <img src="${readmeImageUrl}" 
                             alt="${repo.name} preview" 
                             onerror="this.style.display='none'; this.parentElement.querySelector('span').style.display='flex';" 
                             style="display: block;">
                    ` : ''}
                    <span style="opacity: 0.3; font-weight: bold; ${readmeImageUrl ? 'display: none;' : ''}">${repo.name.substring(0, 2).toUpperCase()}</span>
                </div>
                <div class="project-content">
                    <h3 class="project-title">${repo.name}</h3>
                    <p class="project-description">${description}</p>
                    <div class="project-meta">
                        ${repo.language ? `
                            <span class="project-language">
                                <span class="language-dot" style="background-color: ${languageColor}"></span>
                                ${repo.language}
                            </span>
                        ` : ''}
                        ${repo.stargazers_count > 0 ? `
                            <span class="project-stars">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/>
                                </svg>
                                ${repo.stargazers_count}
                            </span>
                        ` : ''}
                    </div>
                    <div class="project-links">
                        <a href="${repo.html_url}" target="_blank" rel="noopener">View Code</a>
                        ${repo.homepage ? `<a href="${repo.homepage}" target="_blank" rel="noopener">View Site</a>` : ''}
                    </div>
                </div>
            `;

            return card;
        }

        // Load projects when page loads
        document.addEventListener('DOMContentLoaded', fetchGitHubProjects);
    </script>
</body>
</html>
