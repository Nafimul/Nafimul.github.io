<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nafimul – Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg1: #070b10;
    --bg2: #020407;

    --glass: rgba(25, 45, 60, 0.35);
    --glass-strong: rgba(25, 45, 60, 0.6);

    --text: #d6e9f5;
    --dim: #8aa8b8;

    --accent: #7ce3ff;
    --glow: rgba(124, 227, 255, 0.35);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cinzel', serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;

    background:
        radial-gradient(circle at 20% 30%, rgba(120,180,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(120,200,255,0.06), transparent 40%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
}

/* fog texture */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("https://www.transparenttextures.com/patterns/foggy-birds.png");
    opacity: 0.07;
    pointer-events: none;
}

/* layout */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 2rem 1rem;
}

/* header */
header {
    text-align: center;
    margin-bottom: 3rem;
}

h1 {
    font-size: clamp(2.5rem, 6vw, 3.8rem);
    color: var(--accent);
    letter-spacing: 0.1em;
    text-shadow: 0 0 25px var(--glow);
}

.tagline {
    margin-top: 0.6rem;
    color: var(--dim);
}

/* socials */
.social-links {
    margin-top: 1.5rem;
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    flex-wrap: wrap;
}

.social-links a {
    padding: 0.5rem 1rem;
    border-radius: 999px;
    text-decoration: none;
    color: var(--text);
    background: var(--glass);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.social-links a:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 15px var(--glow);
}

/* section title */
.projects-header {
    text-align: center;
    margin-bottom: 2rem;
}

.projects-header h2 {
    font-size: 2rem;
    color: var(--accent);
    text-shadow: 0 0 10px var(--glow);
}

.projects-count {
    color: var(--dim);
}

/* grid */
.projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
}

/* card */
.project-card {
    border-radius: 20px;
    overflow: hidden;
    background: var(--glass);
    backdrop-filter: blur(14px);
    transition: 0.4s;
}

.project-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 0 25px var(--glow);
}

/* image */
.project-image {
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, #1a2a38, #060b12);
    font-size: 2.5rem;
    color: var(--accent);
}

.project-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.85;
}

/* content */
.project-content {
    padding: 1rem;
}

.project-title {
    color: var(--accent);
    margin-bottom: 0.3rem;
}

.project-description {
    color: var(--dim);
    font-size: 0.9rem;
    margin-bottom: 0.7rem;
}

/* meta */
.project-meta {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-bottom: 0.8rem;
}

.project-language,
.project-stars {
    font-size: 0.75rem;
    padding: 0.25rem 0.6rem;
    border-radius: 999px;
    background: rgba(124,227,255,0.08);
}

/* buttons */
.project-links {
    display: flex;
    gap: 0.5rem;
}

.project-links a {
    flex: 1;
    text-align: center;
    padding: 0.4rem;
    border-radius: 999px;
    text-decoration: none;
    color: var(--text);
    transition: 0.3s;
}

.project-links a:hover {
    background: rgba(124,227,255,0.15);
    box-shadow: 0 0 10px var(--glow);
}

/* loading */
.loading {
    text-align: center;
    padding: 2rem;
    color: var(--dim);
}

/* footer */
footer {
    text-align: center;
    margin-top: 3rem;
    color: var(--dim);
}

/* particles canvas */
#particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
<header>
<h1>Nafimul</h1>
<p class="tagline">Computer Science Student & Developer</p>

<div class="social-links">
<a href="https://github.com/Nafimul" target="_blank">GitHub</a>
<a href="https://www.linkedin.com/in/nafimul-islam" target="_blank">LinkedIn</a>
<a href="https://devpost.com/islamnafimul" target="_blank">Devpost</a>
</div>
</header>

<main>
<div class="projects-header">
<h2>Projects</h2>
<p id="projectsCount">Loading...</p>
</div>

<div id="projectsContainer">
<div class="loading">Loading projects...</div>
</div>
</main>

<footer>
<p>Disclaimer: Site Made with The Assistance of GitHub Copilot</p>
</footer>
</div>

<script>
const GITHUB_USERNAME = 'Nafimul';
const GITHUB_API = `https://api.github.com/users/${GITHUB_USERNAME}/repos`;

async function fetchGitHubProjects() {
    const res = await fetch(GITHUB_API);
    let repos = await res.json();

    repos = repos.filter(r => !r.fork && r.name.toLowerCase() !== 'nafimul.github.io');
    repos.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

    const detailedRepos = await Promise.all(repos.map(async (repo) => {
        const imageUrl = await getReadmeImage(repo.owner.login, repo.name, repo.default_branch);
        return { ...repo, readmeImage: imageUrl };
    }));

    const priorityIndex = detailedRepos.findIndex(r => r.name === 'Animator-vs-Animation-IRL');
    if (priorityIndex !== -1) {
        const [priorityRepo] = detailedRepos.splice(priorityIndex, 1);
        detailedRepos.unshift(priorityRepo);
    }

    const chessIndex = detailedRepos.findIndex(r => r.name === 'Chess');
    if (chessIndex !== -1) {
        const [chessRepo] = detailedRepos.splice(chessIndex, 1);
        detailedRepos.push(chessRepo);
    }

    displayProjects(detailedRepos);
}

async function getReadmeImage(owner, repoName, defaultBranch = 'main') {
    try {
        const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}/readme`);
        if (!response.ok) {
            return null;
        }

        const data = await response.json();
        if (!data.content) {
            return null;
        }

        const content = atob(data.content.replace(/\s/g, ''));
        const imageRegex = /!\[[^\]]*\]\(([^\s)]+)(?:\s+"[^"]*")?\)/;
        const match = content.match(imageRegex);

        if (!match || !match[1]) {
            return null;
        }

        let imageUrl = match[1];

        if (!imageUrl.startsWith('http://') && !imageUrl.startsWith('https://')) {
            imageUrl = imageUrl.replace(/^\.?\//, '');
            imageUrl = `https://raw.githubusercontent.com/${owner}/${repoName}/${defaultBranch}/${imageUrl}`;
        }

        return imageUrl;
    } catch (e) {
        console.warn('Could not fetch README image for', repoName, e);
        return null;
    }
}

function displayProjects(repos) {
    const container = document.getElementById('projectsContainer');
    const count = document.getElementById('projectsCount');

    count.textContent = repos.length + " projects";

    const grid = document.createElement('div');
    grid.className = 'projects-grid';

    repos.forEach(r => grid.appendChild(createCard(r)));

    container.innerHTML = "";
    container.appendChild(grid);
}

function createCard(repo) {
    const card = document.createElement('div');
    card.className = 'project-card';

    card.innerHTML = `
        <div class="project-image">
            ${repo.readmeImage ? `<img src="${repo.readmeImage}" alt="${repo.name} thumbnail" onerror="this.style.display='none'">` : repo.name[0]}
        </div>
        <div class="project-content">
            <div class="project-title">${repo.name}</div>
            <div class="project-description">${repo.description || "No description"}</div>

            <div class="project-meta">
                ${repo.language ? `<span class="project-language">${repo.language}</span>` : ""}
                ${repo.stargazers_count ? `<span class="project-stars">★ ${repo.stargazers_count}</span>` : ""}
            </div>

            <div class="project-links">
                <a href="${repo.html_url}" target="_blank">Code</a>
                ${repo.homepage ? `<a href="${repo.homepage}" target="_blank">Demo</a>` : ''}
            </div>
        </div>
    `;
    return card;
}

fetchGitHubProjects();

/* particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = Array.from({length: 60}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    v: Math.random()*0.3
}));

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.y -= p.v;
        if(p.y < 0) p.y = canvas.height;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = "rgba(120,200,255,0.3)";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
